spring:
  application:
    name: ThayCuongLee_BE
  datasource:
    url: ${APP_DATASOURCE_URL}
    username: ${APP_DATASOURCE_USERNAME}
    password: ${APP_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-version: 1
  data:
    web:
      pageable:
        one-indexed-parameters: true

app:
  #  Security
  jwt-secret-key: ${APP_JWT_SECRET_KEY}
  access-token-duration: ${APP_ACCESS_TOKEN_DURATION}
  refresh-token-duration: ${APP_REFRESH_TOKEN_DURATION}
  cookie-secure-enable: ${APP_COOKIE_SECURE_ENABLE}
  cookie-same-site: ${APP_COOKIE_SAME_SITE}
  #  Bootstrap
  bootstrap:
    default-admin-username: ${APP_BOOTSTRAP_ADMIN_USERNAME}
    default-admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD}
