spring:
  application:
    name: ThayCuongLee_BE
  datasource:
    url: ${APP_DATASOURCE_URL}
    username: ${APP_DATASOURCE_USERNAME}
    password: ${APP_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-version: 1
  data:
    web:
      pageable:
        one-indexed-parameters: true

app:
  #  đừng xem lịch sử commit nha hihi <3
  jwt-secret-key: ${APP_JWT_SECRET_KEY}